    module: agents.infra_agent.agent
    class: BaseAgent
    capabilities: [infrastructure, deployment, observability, monitoring]
    skills: [shell, filesystem, analysis]

  - name: dev_agent
    module: agents.dev_agent.agent
    class: BaseAgent
    capabilities: [software_development, code_generation, testing, refactoring]
