      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AGENT_NAME: TENANT-ONBOARDING
      AGENT_ROLE: onboarding_specialist
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ── CAPA 5: FRONTEND ─────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-sonoradigitalcorp.com}/api
        NEXT_PUBLIC_APP_NAME: Hermes OS
    container_name: hermes_frontend
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── CAPA 6: ABE MUSIC MCPs ───────────────────────────────
  spotify-mcp:
    build:
      context: ./apps/spotify-mcp
    container_name: hermes_spotify_mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 128M

  tiktok-mcp:
    build:
      context: ./apps/tiktok-mcp
    container_name: hermes_tiktok_mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 128M

  fashion-mcp:
    build:
      context: ./apps/fashion-mcp
    container_name: hermes_fashion_mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      PINTEREST_ACCESS_TOKEN: ${PINTEREST_ACCESS_TOKEN:-}
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 128M

  task-validator:
    build:
      context: ./apps/task-validator
    container_name: hermes_task_validator
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:8006"
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 256M

  safety-validator:
    build:
      context: ./apps/safety-validator
    container_name: hermes_safety_validator
    restart: unless-stopped
    ports:
      - "127.0.0.1:8007:8007"
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 512M

  comfyui-proxy:
    build:
      context: ./apps/comfyui-proxy
    container_name: hermes_comfyui_proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8008"
    environment:
      COMFYUI_URL: http://host.docker.internal:8188
      DREAMINA_API_KEY: ${DREAMINA_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  hermes_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  n8n_data:
  qdrant_data:
  ollama_data:
