      TELEGRAM_TOKEN_PUBLIC: ${TELEGRAM_TOKEN_PUBLIC}
      CEO_CHAT_ID: ${CEO_CHAT_ID}
      SKILLS_PATH: /app/skills
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ./apps/telegram-bot/skills:/app/skills:ro
    extra_hosts:
