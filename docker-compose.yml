version: '3.9'

# ╔══════════════════════════════════════════════════════════╗
# ║         SONORA DIGITAL CORP — HERMES OS                  ║
# ║    HERMES: Orquestador (Luz)  |  MYSTIC: Estratega       ║
# ╚══════════════════════════════════════════════════════════╝

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &always
  restart: unless-stopped

services:

  # ── CAPA 0: PERSISTENCIA ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hermes_postgres
    <<: *always
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-hermes_db}
      POSTGRES_USER: ${DB_USER:-hermes}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - max_connections=50
      - -c
      - row_security=on
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hermes} -d ${DB_NAME:-hermes_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hermes_redis
    <<: *always
    logging: *default-logging
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── CAPA 0.5: IA LOCAL (RAG + Embeddings) ────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: hermes_qdrant
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-hermes-qdrant-internal}
      QDRANT__LOG_LEVEL: WARN
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hermes_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ollama corre nativo en el host (snap), no como container
  # OLLAMA_URL=http://172.21.0.1:11434 en .env
  # ollama:

  # ── CAPA 1: CANALES (Gateways) ────────────────────────────
  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: hermes_evolution
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_URL:-https://sonoradigitalcorp.com/wa}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER:-hermes}:${DB_PASSWORD}@postgres:5432/evolution_db
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      WEBHOOK_GLOBAL_URL: http://hermes-api:8000/api/v1/webhooks/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      LOG_LEVEL: ERROR
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: 10
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - hermes_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── CAPA 2: ORQUESTACIÓN (N8N) ───────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: hermes_n8n
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: ${DOMAIN:-sonoradigitalcorp.com}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${DOMAIN:-sonoradigitalcorp.com}/n8n/
      N8N_PATH: /n8n/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${DB_NAME:-hermes_db}
      DB_POSTGRESDB_USER: ${DB_USER:-hermes}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      N8N_LOG_LEVEL: warn
      N8N_METRICS: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - hermes_net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── CAPA 3: CEREBRO (FastAPI) ─────────────────────────────
  hermes-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hermes_api
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-hermes}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-hermes_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      ENVIRONMENT: production
      EVOLUTION_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HERMES_MODEL: ${HERMES_MODEL:-google/gemini-2.0-flash-001}
      MYSTIC_MODEL: ${MYSTIC_MODEL:-thudm/glm-z1-rumination:free}
    networks:
      - hermes_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── CAPA 4: AGENTES IA ───────────────────────────────────
  hermes-agent:
    build:
      context: ./apps/hermes
      dockerfile: Dockerfile
    container_name: hermes_agent
    <<: *always
    logging: *default-logging
    env_file:
      - .env
    environment:
      API_URL: http://hermes-api:8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AGENT_MODEL: ${HERMES_MODEL:-google/gemini-2.0-flash-001}
      AGENT_NAME: HERMES
      AGENT_ROLE: orchestrator
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN_HERMES}
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  mystic-agent:
    build:
      context: ./apps/mystic
      dockerfile: Dockerfile
    container_name: mystic_agent
    <<: *always
    logging: *default-logging
    env_file:
      - .env
    environment:
      API_URL: http://hermes-api:8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AGENT_MODEL: ${MYSTIC_MODEL:-thudm/glm-z1-rumination:free}
      AGENT_NAME: MYSTIC
      AGENT_ROLE: shadow_analyst
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN_MYSTIC}
      SYSTEM_EMAIL: ${CEO_EMAIL}
      SYSTEM_PASSWORD: ${CEO_PASSWORD}
      SYSTEM_TENANT: ${CEO_TENANT_SLUG}
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  clawbot:
    build:
      context: ./apps/clawbot
      dockerfile: Dockerfile
    container_name: hermes_clawbot
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:3003:3003"
    env_file:
      - .env
    environment:
      API_URL: http://hermes-api:8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/4
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PORT: 3003
      EVOLUTION_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      TELEGRAM_TOKEN_CEO: ${TELEGRAM_TOKEN_CEO}
      TELEGRAM_TOKEN_PUBLIC: ${TELEGRAM_TOKEN_PUBLIC}
      CEO_CHAT_ID: ${CEO_CHAT_ID}
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
      evolution:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M

  # ── CAPA 4.5: CONTENT AGENT ──────────────────────────────
  content-agent:
    build:
      context: ./apps/content-agent
      dockerfile: Dockerfile
    container_name: hermes_content
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-hermes}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-hermes_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/5
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      FAL_API_KEY: ${FAL_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_PAGE_ID: ${META_PAGE_ID:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      TELEGRAM_TOKEN_CEO: ${TELEGRAM_TOKEN_CEO}
      CEO_CHAT_ID: ${CEO_CHAT_ID}
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── CAPA 5: FRONTEND ─────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-sonoradigitalcorp.com}/api
        NEXT_PUBLIC_APP_NAME: Hermes OS
    container_name: hermes_frontend
    <<: *always
    logging: *default-logging
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    networks:
      - hermes_net
    depends_on:
      hermes-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  hermes_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  n8n_data:
  qdrant_data:
  ollama_data:
