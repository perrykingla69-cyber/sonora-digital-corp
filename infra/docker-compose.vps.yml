version: '3.9'

# docker-compose.vps.yml — Deploy en VPS Hostinger 187.124.85.191
# Estructura real del VPS: solo sonora-digital-corp/ y web/
# Ejecutar desde: /home/mystic/sonora-digital-corp/infra/
# Comando: docker compose -f docker-compose.vps.yml --env-file .env up -d

services:

  postgres:
    image: postgres:15-alpine
    container_name: mystic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mystic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mystic_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mystic_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mystic_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mystic_api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mystic_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mystic_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://sonoradigitalcorp.com}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-90}
      BRAIN_CACHE_TTL: ${BRAIN_CACHE_TTL:-3600}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: mystic_frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mystic_net
    restart: unless-stopped

  # bot (Python legacy) — DESACTIVADO: conflicto con telegram-bot Node.js v2
  # bot:
  #   build:
  #     context: ../bot
  #     dockerfile: Dockerfile
  #   container_name: mystic_bot
  #   environment:
  #     TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
  #     API_URL: http://api:8000
  #   networks:
  #     - mystic_net
  #   restart: "no"

  ollama:
    image: ollama/ollama:latest
    container_name: mystic_ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mystic_net
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

  n8n:
    image: n8nio/n8n:latest
    container_name: mystic_n8n
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-mystic_db}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-mystic_user}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-mystic}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: /n8n/
      WEBHOOK_URL: https://sonoradigitalcorp.com/n8n/
      N8N_SECURE_COOKIE: "true"
      N8N_EDITOR_BASE_URL: https://sonoradigitalcorp.com/n8n/
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mystic_net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mystic_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mystic_net
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  whatsapp:
    build:
      context: ../whatsapp
      dockerfile: Dockerfile
    container_name: mystic_wa
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: 3001
      WA_API_KEY: ${WA_API_KEY}
      AUTH_DIR: /wa-data/auth
      WEBHOOK_URL: http://api:8000/api/wa/webhook
    volumes:
      - wa_data:/wa-data
    networks:
      - mystic_net
    restart: unless-stopped

  whatsapp-bridge:
    build:
      context: ../apps/whatsapp-bridge
      dockerfile: Dockerfile
    container_name: mystic_whatsapp_bridge
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      PORT: 3002
      API_BASE: http://api:8000
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mystic_net
    restart: unless-stopped

  telegram-bot:
    build:
      context: ../apps/telegram-bot
      dockerfile: Dockerfile
    container_name: mystic_telegram_bot
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      PORT: 3003
      API_BASE: http://api:8000
      DEFAULT_BOT_TOKEN: ${TELEGRAM_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mystic_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  ollama_data:
  wa_data:
  qdrant_data:
  whatsapp_sessions:

networks:
  mystic_net:
    driver: bridge
