version: '3.9'

# docker-compose.vps.yml — Deploy en VPS Hostinger 187.124.85.191
# Estructura real del VPS: solo sonora-digital-corp/ y web/
# Ejecutar desde: /home/mystic/sonora-digital-corp/infra/
# Comando: docker compose -f docker-compose.vps.yml --env-file .env up -d

services:

  postgres:
    image: postgres:15-alpine
    container_name: mystic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mystic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mystic_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-schemas.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/multi-tenant.sql:/docker-entrypoint-initdb.d/02-multi-tenant.sql
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mystic_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mystic_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mystic_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mystic_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mystic_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mystic_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3

  n8n:
    image: n8nio/n8n:latest
    container_name: mystic_n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-mystic_db}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-mystic_user}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-mystic}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${DOMAIN:-localhost}/n8n/
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - mystic_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: mystic_nginx
    ports:
      - "80:80"
      - "8082:80"
    volumes:
      - ./nginx/nginx-vps.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/mystic/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - mystic_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  mystic_net:
    driver: bridge
