# ╔══════════════════════════════════════════════════════════╗
# ║     HERMES OS — Nginx Reverse Proxy                      ║
# ║     SSL, seguridad headers, rate limiting                ║
# ╚══════════════════════════════════════════════════════════╝

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=bots:10m rate=100r/m;

# Cache zone
proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;

server {
    listen 80;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;

    ssl_certificate     /etc/letsencrypt/live/sonoradigitalcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonoradigitalcorp.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad Headers ─────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://sonoradigitalcorp.com" always;

    # Ocultar versión nginx
    server_tokens off;

    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ── API Backend ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Auth con rate limit estricto
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass         http://127.0.0.1:8000/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Docs FastAPI (solo si no es producción — comentar en prod)
    # location /docs {
    #     proxy_pass http://127.0.0.1:8000/docs;
    # }

    # ── N8N ──────────────────────────────────────────────
    location /n8n/ {
        proxy_pass         http://127.0.0.1:5678/n8n/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── Evolution API (WhatsApp) ──────────────────────────
    location /wa/ {
        limit_req zone=bots burst=50 nodelay;

        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── ClawBot Telegram Webhooks ─────────────────────────
    location /bots/ {
        limit_req zone=bots burst=100 nodelay;

        proxy_pass         http://127.0.0.1:3003/bots/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Frontend Next.js ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 30s;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|sql|sh|log)$ {
        deny all;
        return 404;
    }
}
