# nginx-vps.conf — HTTP para VPS (sin SSL, primer deploy)
# SSL se agrega después con certbot

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── API Contable + AI OS ──
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Docs de la API
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api:8000/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── N8N ──
    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── App React ──
    location /app/ {
        alias /usr/share/nginx/html/react-dashboard/dist/;
        try_files $uri $uri/ /app/index.html;
    }

    # ── Fourgea SPA ──
    location /fourgea/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /fourgea/index.html;
    }

    # ── Health check ──
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Landing (raíz) ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
