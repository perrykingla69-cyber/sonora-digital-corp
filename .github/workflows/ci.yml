name: CI — Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mystic_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: mystic_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://mystic_user:test_password@localhost:5432/mystic_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          ENVIRONMENT: test
        run: |
          cd backend
          python -c "from database import Base, engine; Base.metadata.create_all(bind=engine); print('DB OK')"
          cd ..
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found yet"

      - name: Verify API imports
        run: |
          cd backend
          python -c "import main; print('Imports OK')"
        env:
          DATABASE_URL: postgresql://mystic_user:test_password@localhost:5432/mystic_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
