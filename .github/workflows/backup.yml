name: Backup — Base de Datos Semanal

on:
  schedule:
    - cron: '0 8 * * 1'  # Lunes 8am UTC (1am Hermosillo)
  workflow_dispatch:

jobs:
  backup:
    runs-on: self-hosted

    steps:
      - name: Backup PostgreSQL
        run: |
          set -e
          DATE=$(date +%Y%m%d_%H%M%S)
          BACKUP_DIR=/home/mystic/backups
          mkdir -p $BACKUP_DIR

          docker exec mystic_postgres pg_dump \
            -U mystic_user mystic_db \
            > $BACKUP_DIR/backup_$DATE.sql

          gzip $BACKUP_DIR/backup_$DATE.sql
          ls -t $BACKUP_DIR/backup_*.sql.gz | tail -n +11 | xargs rm -f 2>/dev/null || true

          echo "Backup guardado: backup_$DATE.sql.gz"
          ls -lh $BACKUP_DIR/backup_*.sql.gz | tail -3

      - name: Notificar Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "💾" || echo "❌")
          python3 -c "
          import urllib.request, json
          msg = '${ICON} Backup semanal ${STATUS} — mystic_db'
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': msg}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          " 2>/dev/null || true
