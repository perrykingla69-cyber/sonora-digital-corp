name: Backup — Base de Datos Semanal

on:
  schedule:
    - cron: '0 8 * * 1'  # Lunes 8am UTC (1am Hermosillo)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Backup PostgreSQL en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DATE=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR=/home/mystic/backups
            mkdir -p $BACKUP_DIR

            docker exec mystic_postgres pg_dump \
              -U mystic_user mystic_db \
              > $BACKUP_DIR/backup_$DATE.sql

            gzip $BACKUP_DIR/backup_$DATE.sql

            # Retener últimos 10 backups
            ls -t $BACKUP_DIR/backup_*.sql.gz | tail -n +11 | xargs rm -f

            echo "Backup guardado: backup_$DATE.sql.gz"
            ls -lh $BACKUP_DIR/backup_*.sql.gz | tail -3

      - name: Notificar resultado
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ job.status == 'success' && '💾' || '❌' }} *Backup semanal ${{ job.status }}*
            Base de datos: `mystic_db`
            Fecha: ${{ github.run_started_at }}
