name: Deploy — VPS Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy al VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /home/mystic/hermes-os

            echo "==> Pull latest"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Detectar cambios"
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
            echo "Archivos cambiados: $CHANGED"

            echo "==> Rebuild servicios afectados"
            if echo "$CHANGED" | grep -qE "apps/api/|all"; then
              echo "  -> Rebuild hermes-api"
              docker compose build hermes-api
              docker compose up -d --force-recreate hermes-api
            fi

            if echo "$CHANGED" | grep -qE "apps/clawbot/|all"; then
              echo "  -> Rebuild clawbot"
              docker compose build clawbot
              docker compose up -d --force-recreate clawbot
            fi

            if echo "$CHANGED" | grep -qE "apps/hermes/|all"; then
              echo "  -> Rebuild hermes-agent"
              docker compose build hermes-agent
              docker compose up -d --force-recreate hermes-agent
            fi

            if echo "$CHANGED" | grep -qE "apps/mystic/|all"; then
              echo "  -> Rebuild mystic-agent"
              docker compose build mystic-agent
              docker compose up -d --force-recreate mystic-agent
            fi

            if echo "$CHANGED" | grep -qE "apps/content-agent/|all"; then
              echo "  -> Rebuild content-agent"
              docker compose build content-agent
              docker compose up -d --force-recreate content-agent
            fi

            if echo "$CHANGED" | grep -q "docker-compose.yml"; then
              echo "  -> docker-compose cambio, up -d general"
              docker compose up -d
            fi

            echo "==> Estado final"
            docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Notificar CEO via Telegram
        if: always()
        env:
          STATUS: ${{ job.status }}
          TOKEN: ${{ secrets.TELEGRAM_TOKEN_CEO }}
          CHAT_ID: ${{ secrets.CEO_CHAT_ID }}
          COMMIT: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
        run: |
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "🔴")
          MSG="${EMOJI} Deploy ${STATUS} en HERMES OS%0A%0ACommit: ${SHA:0:7}%0A${COMMIT}%0A%0A$(date -u '+%Y-%m-%d %H:%M UTC')"
          curl -s "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}&text=${MSG}" > /dev/null
