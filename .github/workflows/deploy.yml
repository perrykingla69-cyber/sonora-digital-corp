name: Deploy — VPS Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forzar rebuild de contenedores'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest & rebuild API
        run: |
          set -e
          cd /home/mystic/sonora-digital-corp

          echo "==> Pull latest"
          git pull origin main

          echo "==> Rebuild API"
          cd infra
          docker compose -f docker-compose.vps.yml --env-file .env build api --no-cache
          docker compose -f docker-compose.vps.yml --env-file .env up -d api

          echo "==> Verify health"
          sleep 6
          STATUS=$(python3 -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/status'); print(r.read().decode())" 2>/dev/null)
          echo "API Status: $STATUS"
          echo "$STATUS" | grep -q '"api":"ok"' && echo "✅ DEPLOY OK" || (echo "❌ HEALTH CHECK FAILED" && exit 1)

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          MSG="${ICON} Deploy ${STATUS} — sonora-digital-corp @ ${{ github.sha }}"
          python3 -c "
          import urllib.request, json
          data = json.dumps({'chat_id': '${{ secrets.TELEGRAM_CHAT_ID }}', 'text': '$MSG'}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          print('Telegram notified')
          " 2>/dev/null || echo "Telegram notification skipped"
