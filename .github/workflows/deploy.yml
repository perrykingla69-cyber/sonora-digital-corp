name: Deploy — Vercel + VPS + Notify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOYMENT_ID: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  # ============================================
  # Deploy to Vercel (mission-control frontend)
  # ============================================
  deploy-vercel:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      vercel_url: ${{ steps.deploy.outputs.preview_url || steps.deploy.outputs.deployment_url }}
      vercel_status: ${{ job.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        id: deploy
        run: |
          cd apps/mission-control
          VERCEL_URL=$(vercel --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | grep "https://" | tail -1 | xargs)
          echo "VERCEL_URL=$VERCEL_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $VERCEL_URL"

      - name: Test Vercel deployment
        run: |
          VERCEL_URL="${{ steps.deploy.outputs.VERCEL_URL }}"
          if [ -z "$VERCEL_URL" ]; then
            echo "⚠️  Vercel URL not found, skipping health check"
            exit 0
          fi
          echo "Testing URL: $VERCEL_URL"
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$VERCEL_URL" || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "⏳ Deployment still initializing (expected)"
          else
            echo "✅ Vercel health check: HTTP $HTTP_CODE"
          fi

  # ============================================
  # VPS deploys automatically via git post-receive hook
  # (GitHub Actions runners lack IPv6 support)
  # ============================================
  deploy-vps:
    name: VPS Auto-Deploy (via git hook)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      vps_status: success

    steps:
      - name: VPS deployment via git hook
        run: |
          echo "✅ VPS auto-deploys via post-receive hook"
          echo "No GitHub Actions SSH needed (IPv6 not supported)"

  # ============================================
  # Notify Telegram
  # ============================================
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-vps]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Prepare notification
        id: notify
        run: |
          VERCEL_STATUS="${{ needs.deploy-vercel.outputs.vercel_status }}"
          VPS_STATUS="${{ needs.deploy-vps.outputs.vps_status }}"

          # Overall status (Vercel only, VPS auto-deploys via git hook)
          if [ "$VERCEL_STATUS" = "success" ]; then
            OVERALL="✅ VERCEL DEPLOYED"
            EMOJI="✅"
          else
            OVERALL="⚠️ VERCEL FAILED"
            EMOJI="⚠️"
          fi

          # Format message
          VERCEL_EMOJI=$([ "$VERCEL_STATUS" = "success" ] && echo "✅" || echo "❌")
          VPS_EMOJI=$([ "$VPS_STATUS" = "success" ] && echo "✅" || echo "❌")

          MSG="$EMOJI *HERMES OS Deploy*%0A"
          MSG="${MSG}%0A*Resultado:* $OVERALL%0A"
          MSG="${MSG}Vercel (Frontend): $VERCEL_EMOJI $VERCEL_STATUS%0A"
          MSG="${MSG}VPS (Backend): 🔄 Auto-deploy via git hook"

          if [ -n "$VPS_HEALTH" ] && [ "$VPS_HEALTH" != "UNHEALTHY" ]; then
            MSG="${MSG} ($VPS_HEALTH)"
          fi

          MSG="${MSG}%0A%0A*Detalles:*%0A"
          MSG="${MSG}Commit: \`${{ github.sha }}\`%0A"
          MSG="${MSG}Rama: ${{ github.ref_name }}%0A"
          MSG="${MSG}Actor: @${{ github.actor }}%0A"
          MSG="${MSG}Timestamp: $(date -u '+%Y-%m-%d %H:%M UTC')%0A"
          MSG="${MSG}%0A[Ver en GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          echo "message=$MSG" >> $GITHUB_OUTPUT
          echo "status=$OVERALL" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.CEO_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN_CEO }}
          message: ${{ steps.notify.outputs.message }}
          format: markdown

      - name: Fallback cURL notification
        if: failure()
        run: |
          MSG="Deploy workflow completed.%0AVercel: ${{ needs.deploy-vercel.outputs.vercel_status }}%0AVPS: ${{ needs.deploy-vps.outputs.vps_status }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN_CEO }}/sendMessage" \
            -d "chat_id=${{ secrets.CEO_CHAT_ID }}&text=$MSG&parse_mode=HTML" > /dev/null || true
