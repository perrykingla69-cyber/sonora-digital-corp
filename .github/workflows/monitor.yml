name: Monitor — HERMES Health Check

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
    - cron: '0 15 * * *'    # reporte diario 8 AM Hermosillo (UTC-7 → 15:00 UTC)
  workflow_dispatch:
    inputs:
      silent:
        description: 'Solo reportar si hay problemas'
        required: false
        default: 'false'

jobs:
  health-check:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_CEO }}
          TELEGRAM_CHAT_ID: ${{ secrets.CEO_CHAT_ID }}
        run: |
          chmod +x scripts/hermes_monitor.sh
          SILENT_FLAG=""
          [[ "${{ github.event.inputs.silent }}" == "true" ]] && SILENT_FLAG="--silent"
          bash scripts/hermes_monitor.sh $SILENT_FLAG || true

      - name: Auto-fix — sync repo si está desactualizado
        run: |
          LOCAL=$(git -C /home/mystic/hermes-os rev-parse HEAD)
          REMOTE=$(git -C /home/mystic/hermes-os rev-parse origin/main)
          if [[ "$LOCAL" != "$REMOTE" ]]; then
            echo "==> Sincronizando repo..."
            git -C /home/mystic/hermes-os fetch origin
            git -C /home/mystic/hermes-os reset --hard origin/main
            echo "✅ Repo sincronizado a $(git -C /home/mystic/hermes-os rev-parse --short HEAD)"
          else
            echo "✅ Repo ya al día"
          fi

      - name: Auto-fix — levantar contenedores caídos
        run: |
          DC="docker compose -f /home/mystic/hermes-os/docker-compose.yml --env-file /home/mystic/hermes-os/.env"
          DOWN=$(docker ps --filter "status=exited" --filter "name=hermes" --format "{{.Names}}" 2>/dev/null)
          if [[ -n "$DOWN" ]]; then
            echo "==> Contenedores caídos: $DOWN"
            $DC up -d --remove-orphans
            echo "✅ Servicios levantados"
          else
            echo "✅ Todos los contenedores corriendo"
          fi
